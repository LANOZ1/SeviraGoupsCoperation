<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SeviraGoupsCoperation - Social</title>
    <style>
        /* --- STYLE GLOBAL STYLE FACEBOOK --- */
        body { background-color: #0b0b0b; color: #e4e6eb; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding-top: 56px; height: 100vh; overflow: hidden; }
        
        /* BARRE DU HAUT */
        header { position: fixed; top: 0; left: 0; right: 0; height: 56px; background: #1b1b1b; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; z-index: 2000; }
        .logo { color: #FF9900; font-weight: 800; font-size: 1.4rem; text-decoration: none; cursor: pointer; text-transform: uppercase; }
        .logo span { color: #fff; font-weight: 400; font-size: 1rem; margin-left: 5px; }
        
        .search-container { flex: 0.3; background: #3a3b3c; border-radius: 20px; display: flex; align-items: center; padding: 0 12px; }
        .search-container input { background: transparent; border: none; padding: 8px; color: white; width: 100%; outline: none; }
        
        /* LAYOUT 3 COLONNES */
        .app-container { display: flex; height: calc(100vh - 56px); }
        
        /* GAUCHE */
        .sidebar-left { width: 280px; padding: 15px; overflow-y: auto; background: #0b0b0b; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-weight: 500; }
        .nav-item:hover { background: #3a3b3c; }
        .nav-icon { width: 36px; height: 36px; background: #FF9900; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; }

        /* CENTRE (FIL D'ACTUALITÉ) */
        .feed-container { flex: 1; overflow-y: auto; padding: 20px 0; display: flex; flex-direction: column; align-items: center; }
        .post-creator { background: #1b1b1b; width: 90%; max-width: 550px; border-radius: 8px; padding: 15px; margin-bottom: 20px; border: 1px solid #333; }
        .creator-top { display: flex; gap: 10px; margin-bottom: 15px; }
        .fake-input { background: #3a3b3c; flex: 1; border-radius: 20px; display: flex; align-items: center; padding-left: 15px; color: #b0b3b8; cursor: pointer; }

        .video-card { background: #1b1b1b; width: 90%; max-width: 550px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #333; overflow: hidden; }
        .video-header { padding: 12px; display: flex; align-items: center; gap: 10px; }
        .v-avatar { width: 35px; height: 35px; border-radius: 50%; background: #FF9900; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; }
        .video-card video { width: 100%; max-height: 450px; background: #000; }

        /* DROITE (CHAT) */
        .sidebar-right { width: 300px; border-left: 1px solid #333; padding: 15px; background: #1b1b1b; display: flex; flex-direction: column; }
        .chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-bottom: 15px; }
        .msg { max-width: 80%; padding: 8px 12px; border-radius: 15px; font-size: 14px; }
        .msg-mine { align-self: flex-end; background: #FF9900; color: #000; }
        .msg-other { align-self: flex-start; background: #3a3b3c; color: #fff; }

        /* MODALES */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; justify-content: center; align-items: center; }
        .modal-box { background: #242526; width: 450px; padding: 25px; border-radius: 10px; text-align: center; border: 1px solid #444; }
        .modal-box input { width: 100%; background: #3a3b3c; border: none; color: white; padding: 12px; margin: 10px 0; border-radius: 6px; box-sizing: border-box; }
        .btn-orange { background: #FF9900; color: #000; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

    <header>
        <div class="logo">SeviraGoups<span>Coperation</span></div>
        <div class="search-container">
            <input type="text" placeholder="Rechercher sur Sevira...">
        </div>
        <div id="auth-section">
            <button class="btn-orange" id="btn-login-ui" onclick="toggleModal('login-modal', true)">CONNEXION</button>
            <button class="btn-orange" id="btn-up-ui" style="display:none; padding: 8px 15px;" onclick="toggleModal('upload-modal', true)">+ PUBLIER</button>
        </div>
    </header>

    <div class="app-container">
        <aside class="sidebar-left">
            <div class="nav-item"> <div class="nav-icon">🏠</div> Accueil </div>
            <div class="nav-item" onclick="toggleModal('group-modal', true)"> <div class="nav-icon">👥</div> Créer un Groupe </div>
            <hr style="border:0; border-top:1px solid #333; margin: 15px 0;">
            <div id="groups-list-ui" style="color:#aaa; font-size: 13px;">Connectez-vous pour voir vos groupes.</div>
        </aside>

        <main class="feed-container">
            <div class="post-creator" onclick="toggleModal('upload-modal', true)">
                <div class="creator-top">
                    <div class="v-avatar" id="my-avatar">S</div>
                    <div class="fake-input">Quoi de neuf ? Partage une vidéo !</div>
                </div>
            </div>
            <div id="video-feed" style="width: 100%; display:flex; flex-direction:column; align-items:center;">
                </div>
        </main>

        <aside class="sidebar-right">
            <h3 style="margin: 0 0 15px 0; font-size: 16px; color: #FF9900;" id="active-chat-name">💬 Chat Global</h3>
            <div class="chat-messages" id="chat-messages">
                <div style="text-align:center; color:#555; margin-top:20px;">Connectez-vous pour discuter</div>
            </div>
            <div style="display:flex; gap:5px;">
                <input type="text" id="msg-input" placeholder="Aa" style="flex:1; background:#3a3b3c; border:none; color:white; padding:10px; border-radius:20px; outline:none;" onkeypress="if(event.key==='Enter') window.envoyerMsg()">
                <button onclick="window.envoyerMsg()" style="background:none; border:none; cursor:pointer; font-size:20px;">🚀</button>
            </div>
        </aside>
    </div>

    <div id="login-modal" class="modal"><div class="modal-box">
        <h2 style="color:#FF9900">Bienvenue</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Mot de passe">
        <button class="btn-orange" onclick="window.authAction('login')">SE CONNECTER</button>
        <p onclick="window.authAction('register')" style="color:#3ea6ff; cursor:pointer; margin-top:15px;">Pas de compte ? S'inscrire</p>
        <p onclick="toggleModal('login-modal', false)" style="cursor:pointer; font-size:12px; opacity:0.6;">Fermer</p>
    </div></div>

    <div id="upload-modal" class="modal"><div class="modal-box">
        <h2 style="color:#FF9900">Nouvelle Publication</h2>
        <input type="file" id="video-file" accept="video/*">
        <input type="text" id="video-title-input" placeholder="Titre de la vidéo">
        <button class="btn-orange" id="up-btn-label" onclick="window.uploadVideo()">PUBLIER SUR LE FIL</button>
        <p onclick="toggleModal('upload-modal', false)" style="cursor:pointer; opacity:0.6;">Annuler</p>
    </div></div>

    <div id="group-modal" class="modal"><div class="modal-box">
        <h2 style="color:#FF9900">Nouveau Groupe</h2>
        <input type="text" id="group-name" placeholder="Nom du groupe">
        <button class="btn-orange" onclick="window.creerGroupe()">CRÉER</button>
        <p onclick="toggleModal('group-modal', false)" style="cursor:pointer; opacity:0.6;">Fermer</p>
    </div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        // TA CONFIGURATION RÉELLE
        const firebaseConfig = {
            apiKey: "AIzaSyBT6YhxYgYLp_iUsCa4PQGbK4TWb8YINtM",
            authDomain: "kouaitrahub-b0879.firebaseapp.com",
            projectId: "kouaitrahub-b0879",
            storageBucket: "kouaitrahub-b0879.firebasestorage.app",
            messagingSenderId: "170543975192",
            appId: "1:170543975192:web:4b64c42fb582a5fcc0ac6d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let currentUser = null;
        let currentGroupId = "global"; 
        let unsubMessages = null;

        // AUTH
        window.authAction = (type) => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            if(!e || !p) return alert("Remplis les champs !");
            const action = type === 'login' ? signInWithEmailAndPassword : createUserWithEmailAndPassword;
            action(auth, e, p).then(() => toggleModal('login-modal', false)).catch(err => alert(err.message));
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if(user) {
                document.getElementById('btn-login-ui').style.display = 'none';
                document.getElementById('btn-up-ui').style.display = 'block';
                document.getElementById('my-avatar').innerText = user.email.charAt(0).toUpperCase();
                window.loadVideos();
                window.listenToMessages(currentGroupId);
                window.loadMyGroups();
            }
        });

        // VIDÉOS (STYLE FIL FACEBOOK)
        window.uploadVideo = async () => {
            const file = document.getElementById('video-file').files[0];
            const title = document.getElementById('video-title-input').value;
            if(!file || !title) return alert("Choisis une vidéo et un titre !");
            const btn = document.getElementById('up-btn-label');
            btn.innerText = "PUBLICATION EN COURS..."; btn.disabled = true;

            try {
                const sRef = ref(storage, `posts/${Date.now()}_${file.name}`);
                await uploadBytes(sRef, file);
                const url = await getDownloadURL(sRef);
                await addDoc(collection(db, "videos"), { title, url, author: currentUser.email, uid: currentUser.uid, createdAt: serverTimestamp() });
                toggleModal('upload-modal', false);
            } catch (err) { alert(err.message); }
            btn.innerText = "PUBLIER SUR LE FIL"; btn.disabled = false;
        };

        window.loadVideos = () => {
            onSnapshot(query(collection(db, "videos"), orderBy("createdAt", "desc")), (snap) => {
                const feed = document.getElementById('video-feed');
                feed.innerHTML = "";
                snap.forEach(doc => {
                    const v = doc.data();
                    const card = document.createElement('div');
                    card.className = "video-card";
                    card.innerHTML = `
                        <div class="video-header">
                            <div class="v-avatar">${v.author.charAt(0).toUpperCase()}</div>
                            <div><strong>${v.author.split('@')[0]}</strong></div>
                        </div>
                        <div style="padding: 0 12px 10px;">${v.title}</div>
                        <video src="${v.url}" controls></video>
                    `;
                    feed.appendChild(card);
                });
            });
        };

        // CHAT
        window.envoyerMsg = async () => {
            const input = document.getElementById('msg-input');
            const txt = input.value.trim();
            if(!txt || !currentUser) return;
            input.value = "";
            await addDoc(collection(db, "chats", currentGroupId, "messages"), { text: txt, author: currentUser.email, uid: currentUser.uid, time: serverTimestamp() });
        };

        window.listenToMessages = (groupId) => {
            if(unsubMessages) unsubMessages();
            unsubMessages = onSnapshot(query(collection(db, "chats", groupId, "messages"), orderBy("time", "asc")), (snap) => {
                const box = document.getElementById('chat-messages');
                box.innerHTML = "";
                snap.forEach(doc => {
                    const m = doc.data();
                    const isMe = m.uid === currentUser.uid;
                    const d = document.createElement('div');
                    d.className = `msg ${isMe ? 'msg-mine' : 'msg-other'}`;
                    d.innerHTML = `<small style="display:block; font-size:9px; opacity:0.7">${m.author.split('@')[0]}</small>${m.text}`;
                    box.appendChild(d);
                });
                box.scrollTop = box.scrollHeight;
            });
        };

        window.creerGroupe = async () => {
            const name = document.getElementById('group-name').value;
            if(!name) return;
            await addDoc(collection(db, "groups"), { name, members: [currentUser.uid], createdAt: serverTimestamp() });
            toggleModal('group-modal', false);
        };

        window.loadMyGroups = () => {
            onSnapshot(query(collection(db, "groups"), where("members", "array-contains", currentUser.uid)), (snap) => {
                const list = document.getElementById('groups-list-ui');
                list.innerHTML = "<b>Mes Groupes</b><br>";
                snap.forEach(doc => {
                    const g = doc.data();
                    const d = document.createElement('div');
                    d.className = "nav-item"; d.innerText = "👥 " + g.name;
                    d.onclick = () => { 
                        currentGroupId = doc.id; 
                        document.getElementById('active-chat-name').innerText = "💬 " + g.name;
                        window.listenToMessages(doc.id);
                    };
                    list.appendChild(d);
                });
            });
        };

        window.toggleModal = (id, show) => document.getElementById(id).style.display = show ? 'flex' : 'none';
    </script>
</body>
</html>
